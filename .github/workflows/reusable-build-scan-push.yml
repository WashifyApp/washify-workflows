name: Reusable — Build, Scan & Push to GHCR

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      MAIL_RECIPIENT:
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-scan-push:
    name: "[${{ inputs.environment }}] Build → Trivy → Push GHCR"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Full Image Name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SERVICE=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG="${{ inputs.image_tag }}"
          if [[ "$TAG" == sha-* ]]; then
            FULL_SHA="${TAG#sha-}"
            TAG="sha-${FULL_SHA:0:7}"
          fi
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${SERVICE}:${TAG}"
          echo "full_image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "image_tag=${TAG}"    >> $GITHUB_OUTPUT
          echo "Building image: ${IMAGE}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.image.outputs.full_image }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load Image for Trivy
        run: docker load --input /tmp/image.tar

      # ── Trivy actually scans and FAILS on HIGH/CRITICAL ────
      - name: Run Trivy Scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.full_image }}
          format: table
          exit-code: 1          # ← fails the step if vulns found
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          output: trivy-table.txt

      - name: Run Trivy JSON Report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.full_image }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.event.repository.name }}-${{ github.run_number }}
          path: |
            trivy-report.json
            trivy-table.txt
          retention-days: 30

      # ── Push only if Trivy passed ───────────────────────────
      - name: Push Image to GHCR
        id: push
        run: docker push ${{ steps.image.outputs.full_image }}

      - name: Email — Build & Trivy PASSED
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "🚀 [Build+Trivy][${{ inputs.environment }}] PASSED — ${{ github.event.repository.name }}:${{ steps.image.outputs.image_tag }}"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — BUILD & SECURITY REPORT
            ══════════════════════════════════════════
            Result      : ✅ ALL CHECKS PASSED — IMAGE PUSHED

            Service     : ${{ github.event.repository.name }}
            Environment : ${{ inputs.environment }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}

            🐳 IMAGE DETAILS:
            Image : ${{ steps.image.outputs.full_image }}
            Tag   : ${{ steps.image.outputs.image_tag }}

            👁 View Image:
            https://github.com/orgs/${{ github.repository_owner }}/packages

            📎 Trivy Report Artifact:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ⚙️  NEXT STEP:
            Update washify-gitops dev/apps/${{ github.event.repository.name }}/values.yaml:
              image:
                tag: ${{ steps.image.outputs.image_tag }}
            ══════════════════════════════════════════
            — Washify CI/CD

      - name: Email — Trivy FAILED
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ [Trivy][${{ inputs.environment }}] FAILED — ${{ github.event.repository.name }} — IMAGE NOT PUSHED"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — TRIVY SCAN REPORT
            ══════════════════════════════════════════
            Result : ❌ HIGH/CRITICAL VULNERABILITIES FOUND — IMAGE NOT PUSHED

            Service     : ${{ github.event.repository.name }}
            Environment : ${{ inputs.environment }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}

            Action: Fix the vulnerabilities in your Dockerfile base image
            or dependency versions. Download the full report below.

            📎 Full Trivy Report:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ══════════════════════════════════════════
            — Washify CI/CD
