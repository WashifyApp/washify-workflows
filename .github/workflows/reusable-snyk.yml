name: Reusable — Snyk Vulnerability Scan

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      MAIL_RECIPIENT:
        required: true

jobs:
  snyk:
    name: "[${{ inputs.environment }}] Snyk Dependency Scan"
    runs-on: ubuntu-latest
    # continue-on-error: true  ← UNCOMMENT to make pipeline non-blocking
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Snyk Scan
        id: snyk
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Upload Snyk Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ github.event.repository.name }}-${{ github.run_number }}
          path: snyk.json
          retention-days: 30
        continue-on-error: true

      - name: Email — Snyk PASSED
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "✅ [Snyk][${{ inputs.environment }}] PASSED — ${{ github.event.repository.name }}"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — SNYK DEPENDENCY REPORT
            ══════════════════════════════════════════
            Result      : ✅ NO HIGH/CRITICAL VULNERABILITIES
            Service     : ${{ github.event.repository.name }}
            Environment : ${{ inputs.environment }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}

            Full report artifact available at:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Pipeline proceeding to Stage 3 (Build + Trivy + GHCR Push).
            ══════════════════════════════════════════
            — Washify CI/CD

      - name: Email — Snyk FAILED
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ [Snyk][${{ inputs.environment }}] FAILED — ${{ github.event.repository.name }}"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — SNYK DEPENDENCY REPORT
            ══════════════════════════════════════════
            Result      : ❌ HIGH/CRITICAL VULNERABILITIES FOUND — PIPELINE STOPPED
            Service     : ${{ github.event.repository.name }}
            Environment : ${{ inputs.environment }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}

            Action: Run 'snyk test' locally and fix all HIGH/CRITICAL issues.
            Report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ══════════════════════════════════════════
            — Washify CI/CD
