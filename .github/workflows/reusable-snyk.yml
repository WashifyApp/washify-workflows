name: Reusable — Snyk Vulnerability Scan

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment label (dev or prod)"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      MAIL_RECIPIENT:
        required: true

jobs:
  snyk:
    name: "[${{ inputs.environment }}] Snyk Dependency Scan"
    runs-on: ubuntu-latest
    continue-on-error: true   # ← TEMPORARY: remove this for strict production gates
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Snyk Scan (capture output + JSON report)
        id: snyk
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}

          # Run scan — capture human-readable output
          snyk test \
            --severity-threshold=high \
            --json-file-output=snyk-report.json \
            > snyk-output.txt 2>&1 || true

          # Parse counts from JSON
          TOTAL=$(cat snyk-report.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          vulns = data.get('vulnerabilities', [])
          high = sum(1 for v in vulns if v.get('severity') in ['high','critical'])
          total = len(vulns)
          print(f'TOTAL={total}')
          print(f'HIGH={high}')
          " 2>/dev/null || echo "TOTAL=N/A
          HIGH=N/A")
          echo "$TOTAL" >> $GITHUB_ENV
          echo "$HIGH" >> $GITHUB_ENV

          # Determine result
          if grep -q '"ok": true' snyk-report.json 2>/dev/null; then
            echo "snyk_status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "snyk_status=VULNERABILITIES_FOUND" >> $GITHUB_OUTPUT
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ github.event.repository.name }}-${{ github.run_number }}
          path: |
            snyk-report.json
            snyk-output.txt
          retention-days: 30

      - name: Email — Snyk Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "${{ steps.snyk.outputs.snyk_status == 'PASSED' && '✅' || '⚠️' }} [Snyk][${{ inputs.environment }}] ${{ github.event.repository.name }} — ${{ steps.snyk.outputs.snyk_status }}"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — SNYK DEPENDENCY REPORT
            ══════════════════════════════════════════

            Service       : ${{ github.event.repository.name }}
            Environment   : ${{ inputs.environment }}
            Branch        : ${{ github.ref_name }}
            Commit        : ${{ github.sha }}
            Triggered by  : ${{ github.actor }}
            Result        : ${{ steps.snyk.outputs.snyk_status }}

            ──────────────────────────────────────────
            📊 VULNERABILITY SUMMARY
            ──────────────────────────────────────────
            Total Vulnerabilities : ${{ env.TOTAL }}
            High/Critical         : ${{ env.HIGH }}
            Threshold             : HIGH and above

            ──────────────────────────────────────────
            📎 FULL REPORT
            ──────────────────────────────────────────
            The detailed snyk-report.json and snyk-output.txt
            are available as GitHub Actions Artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ──────────────────────────────────────────
            ⚙️  PIPELINE STATUS
            ──────────────────────────────────────────
            The pipeline is CONTINUING to Stage 3 (Docker Build + Trivy).
            NOTE: Snyk is in REPORT-ONLY mode.
            To enforce gate, remove continue-on-error from reusable-snyk.yml

            ══════════════════════════════════════════
            — Washify CI/CD Automated Report
            ══════════════════════════════════════════
