name: Reusable — SonarQube Quality Gate

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      MAIL_RECIPIENT:
        required: true

jobs:
  sonarqube:
    name: "[${{ inputs.environment }}] SonarQube Quality Gate"
    runs-on: ubuntu-latest
    # continue-on-error: true  ← UNCOMMENT this line to make pipeline non-blocking
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        id: scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check Quality Gate Status
        id: quality_gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Email — SonarQube PASSED
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "✅ [SonarQube][${{ inputs.environment }}] PASSED — ${{ github.event.repository.name }}"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — SONARQUBE REPORT
            ══════════════════════════════════════════
            Result      : ✅ QUALITY GATE PASSED
            Service     : ${{ github.event.repository.name }}
            Environment : ${{ inputs.environment }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            📊 Full Report:
            ${{ secrets.SONAR_HOST_URL }}/dashboard?id=washify-${{ github.event.repository.name }}

            Pipeline proceeding to Stage 2 (Snyk).
            ══════════════════════════════════════════
            — Washify CI/CD

      - name: Email — SonarQube FAILED
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ [SonarQube][${{ inputs.environment }}] FAILED — ${{ github.event.repository.name }}"
          body: |
            ══════════════════════════════════════════
            WASHIFY CI/CD — SONARQUBE REPORT
            ══════════════════════════════════════════
            Result      : ❌ QUALITY GATE FAILED — PIPELINE STOPPED
            Service     : ${{ github.event.repository.name }}
            Environment : ${{ inputs.environment }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            📊 Fix issues here:
            ${{ secrets.SONAR_HOST_URL }}/dashboard?id=washify-${{ github.event.repository.name }}

            Action: Fix all code quality issues before pushing again.
            ══════════════════════════════════════════
            — Washify CI/CD
